<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title> Registration Form</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2> Registration Form</h2>

<form id="form">

<input type="text" id="name" placeholder="Full Name" required>

<input type="text" id="father" placeholder="Father Name" required>

<input type="text" id="college" list="collegeList" placeholder="Search College">

<datalist id="collegeList">

<option value="IIT Delhi">
<option value="IIT Bombay">
<option value="IIT Kanpur">
<option value="Delhi University">
<option value="Amity University">
<option value="Galgotias University">
<option value="Sharda University">
<option value="AKTU Lucknow">
<option value="Noida Institute of Engineering and Technology">
<option value="KCC Institute of Technology and Management">

</datalist>

<select id="sex" required>

<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>

</select>

<input type="date" id="dob" required>

<input type="text" id="phone" placeholder="Phone Number" required>

<input type="email" id="email" placeholder="Email Address" required>

<div class="password-box">

<input type="password" id="password" placeholder="Password" required>

<span onclick="togglePassword()">Show</span>

</div>

<div class="strength">

<div id="strengthBar"></div>

</div>

<input type="text" id="village" placeholder="Village">

<input type="text" id="city" placeholder="City">

<input type="text" id="state" placeholder="State">

<button type="submit">Register</button>

</form>

<input type="text" id="search" placeholder="Search Student...">


<div class="table-container">

<table>

<thead>

<tr>

<th>Name</th>
<th>Father</th>
<th>College</th>
<th>Gender</th>
<th>DOB</th>
<th>Phone</th>
<th>Email</th>
<th>Village</th>
<th>City</th>
<th>State</th>
<th>Action</th>

</tr>

</thead>

<tbody id="userTable"></tbody>

</table>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
